apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mocktwo-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mocktwo
  minReplicas: 1
  maxReplicas: 1 
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
